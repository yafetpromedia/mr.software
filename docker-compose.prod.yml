# Production stack: PostgreSQL + Mr.Software app
#
# 1. cp .env.production.example .env.production
# 2. Fill secrets (run: npm run prod:secrets)
# 3. docker compose -f docker-compose.prod.yml up -d --build
# 4. docker compose -f docker-compose.prod.yml exec app npx prisma db push

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-mr_software}
    volumes:
      - mr_software_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mr_software}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mr_software}?schema=public
      LOCAL_DEPLOY_ROOT: /var/mr-software/deployments
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - mr_software_deployments:/var/mr-software/deployments
      - mr_software_site_uploads:/app/public/brand/uploads

volumes:
  mr_software_pg_data:
  mr_software_deployments:
  mr_software_site_uploads:
