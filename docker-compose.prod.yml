# Production stack: PostgreSQL + Mr.Software app
#
# 1. cp .env.production.example .env.production
# 2. Fill secrets (run: npm run prod:secrets)
# 3. Set DATABASE_URL host to `db` (see .env.production.example)
# 4. npm run prod:up
# 5. docker compose -f docker-compose.prod.yml --env-file .env.production exec app npx prisma db push

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - mr_software_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mr_software"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      LOCAL_DEPLOY_ROOT: /var/mr-software/deployments
      SITE_UPLOAD_ROOT: /var/mr-software/site-uploads
    ports:
      - "3000:3000"
    volumes:
      - mr_software_deployments:/var/mr-software/deployments
      - mr_software_site_uploads:/var/mr-software/site-uploads

volumes:
  mr_software_pg_data:
  mr_software_deployments:
  mr_software_site_uploads:
